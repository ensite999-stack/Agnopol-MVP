<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Agnopol Test</title>
</head>
<body>

<h2>Agnopol MVP Test</h2>

<button onclick="connect()">1️⃣ 连接钱包</button>
<button onclick="verify()">2️⃣ 验证 + 获取余额</button>

<pre id="output"></pre>

<script src="https://cdn.jsdelivr.net/npm/ethers@5.7.2/dist/ethers.min.js"></script>

<script>
let signer, address;

async function connect() {
  try {
    const provider = new ethers.providers.Web3Provider(window.ethereum);
    await provider.send("eth_requestAccounts", []);
    signer = provider.getSigner();
    address = await signer.getAddress();

    document.getElementById("output").innerText =
      "✅ 已连接钱包: " + address;

  } catch (err) {
    document.getElementById("output").innerText =
      "❌ 连接失败: " + err.message;
  }
}

async function verify() {
  try {
    const message = "Agnopol verification";

    // 1️⃣ 签名
    const signature = await signer.signMessage(message);

    // 2️⃣ 请求你的后端
    const res = await fetch("https://agnopol-mvp.onrender.com/verify", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        address: address,
        signature: signature
      })
    });

    const data = await res.json();

    // 3️⃣ 显示结果
    document.getElementById("output").innerText =
      JSON.stringify(data, null, 2);

  } catch (err) {
    document.getElementById("output").innerText =
      "❌ 错误: " + err.message;
  }
}
</script>

</body>
</html>
