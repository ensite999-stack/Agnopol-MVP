name: Agnopol V2 ZK-Deployer

on:
  push:
    branches: [ main ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      # 1. 安装 ZK 编译器
      - name: Install ZK Tools
        run: |
          npm install -g snarkjs
          sudo wget -qO /usr/local/bin/circom https://github.com/iden3/circom/releases/latest/download/circom-linux-amd64
          sudo chmod +x /usr/local/bin/circom

      # 2. 关键：先安装依赖，解决 Poseidon 哈希库找不到的问题
      - name: Install Dependencies
        run: npm install

      # 3. 编译 ZK 电路（增加 -l 参数指明库路径）
      - name: Compile ZK Circuit
        run: |
          mkdir -p contracts
          cd circuits
          circom Agnopol.circom --r1cs --wasm --sym -l ../node_modules
          
          # 生成临时开发用的 Power of Tau 仪式
          snarkjs powersoftau new bn128 12 pot12_0000.ptau -v
          snarkjs powersoftau contribute pot12_0000.ptau pot12_0001.ptau --name="First contribution" -v -e="Agnopol Privacy"
          snarkjs powersoftau prepare phase2 pot12_0001.ptau pot12_final.ptau -v
          snarkjs groth16 setup Agnopol.r1cs pot12_final.ptau Agnopol_0000.zkey
          
          # 核心产物：导出为 Solidity 验证合约
          snarkjs zkey export solidityverifier Agnopol_0000.zkey ../contracts/Verifier.sol

      # 4. 部署到 Base Sepolia
      - name: Deploy to Base Sepolia
        env:
          PRIVATE_KEY: ${{ secrets.PRIVATE_KEY }}
          RPC_URL: "https://sepolia.base.org"
        run: npx hardhat run scripts/deploy.js --network base-sepolia
