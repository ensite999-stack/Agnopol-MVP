name: 部署 Agnopol

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v3

      - name: 安装 Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18.x'

      - name: 安装所有依赖
        # 关键修改：在这里增加了 dotenv 的安装
        run: npm install --save-dev hardhat @nomicfoundation/hardhat-toolbox @openzeppelin/contracts dotenv

      - name: 运行部署并验证
        run: npx hardhat run scripts/deploy.js --network base-sepolia
        env:
          QUICKNODE_RPC_URL: ${{ secrets.QUICKNODE_RPC_URL }}
          PRIVATE_KEY: ${{ secrets.PRIVATE_KEY }}
          BASESCAN_API_KEY: ${{ secrets.BASESCAN_API_KEY }}
