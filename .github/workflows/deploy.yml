name: Deploy Agnopol

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'

      - name: Install Dependencies
        # 这里增加了 @openzeppelin/contracts
        run: npm install --save-dev hardhat @nomicfoundation/hardhat-toolbox @openzeppelin/contracts

      - name: Run Deploy
        run: npx hardhat run scripts/deploy.js --network base-sepolia
        env:
          PRIVATE_KEY: ${{ secrets.PRIVATE_KEY }}
          QUICKNODE_RPC_URL: ${{ secrets.QUICKNODE_RPC_URL }}
